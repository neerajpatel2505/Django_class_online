<div>
    <button type="submit"><a href="{% url 'register' %}">Register</a></button>

    <a href=""> <button type="submit">Login</button></a>
</div>

{% if register %}
<h3>Welcome to registration form</h3>
<div class="container">
    <h2>Registration Form</h2>
    <form action="" method="post">
        {% csrf_token %}
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter Full Name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter Email" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter Mobile Number" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <label>Date of Birth</label>
        <input type="date" name="dob">

        <label>Gender</label>

        <div class="gender">
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
        </div>

        <label>Country</label>
        <select name="country">
            <option>Select Country</option>
            <option>India</option>
            <option>USA</option>
            <option>Canada</option>
            <option>Australia</option>
        </select>

        <label>Address</label>
        <textarea rows="3" placeholder="Enter Address"></textarea>

        <div class="checkbox">
            <input type="checkbox" required>
            I agree to the Terms & Conditions
        </div>

        <input type="submit" value="Register">

    </form>

</div>
{% elif login %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:350px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#007BFF;
        }

        .options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin:15px 0;
            font-size:14px;
        }

        .options input{
            width:auto;
        }

        a{
            text-decoration:none;
            color:#007BFF;
        }

        a:hover{
            text-decoration:underline;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .register{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <form action="#" method="post">

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="register">
        Don't have an account?
        <a href="#">Register</a>
    </div>

</div>

</body>
</html>
{% endif %}
