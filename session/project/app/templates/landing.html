<div style="text-align:center">
    <a href="{% url 'set' %}"> <button type="submit">set_session</button> </a>
    <br /> <br />
    <a href="{% url 'get' %}"> <button type="submit">get_session</button> </a>
    <br /> <br />
    <a href="{% url 'delete' %}"> <button type="submit">delete_session</button> </a><br /> <br />
</div>
<hr />
<div style="text-align:center"> 
    {% if set %}
        <form action="" method="post">
           {% csrf_token %}
            Name: <input type="text" name="fname" id=""><br />
            Email: <input type="email" name="my_email" id=""> <br />
            Age: <input type="number" name="my_age" id=""> <br />
            <input type="submit" value="Set-Session-data"> <br />
        </form>
    {% elif set_data %}
    <h3>Our Sessions are set........</h3>
    {% elif data %}
        My Name is : {{data.name}} <br />
        My Age is : {{data.age}} <br />
        My Email is : {{data.email}} <br />
    {% elif msg %}
    {{msg}}
    {% endif %}
</div>
