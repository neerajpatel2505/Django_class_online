<button type="submit"> <a href="{% url 'register' %}">Register</a> </button>
<button type="submit"> <a href="{% url 'login' %}">Login</a> </button>


{% if register %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:12px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
        }

        .gender{
            display:flex;
            gap:20px;
            margin-top:8px;
        }

        .gender label{
            font-weight:normal;
            display:flex;
            align-items:center;
            gap:5px;
            margin-top:0;
        }

        .buttons{
            margin-top:20px;
            display:flex;
            justify-content:space-between;
        }

        button{
            width:48%;
            padding:10px;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        .submit{
            background:#28a745;
            color:white;
        }

        .reset{
            background:#dc3545;
            color:white;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color:green"> {{msg}} </h1>
        <h2>Registration Form</h2>

        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>City</label>
            <select name="city" required>
                <option value="">Select City</option>
                <option>Bhopal</option>
                <option>Indore</option>
                <option>Delhi</option>
                <option>Mumbai</option>
                <option>Pune</option>
            </select>

            <label>Profile Image</label>
            <input type="file" name="image" accept="image/*">

            <label>Resume</label>
            <input type="file" name="resume" accept=".pdf,.doc,.docx">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <label>Con_Password</label>
            <input type="password" name="con_password" placeholder="Enter password" required>

            <label>Gender</label>

            <div class="gender">
                <label>
                    <input type="radio" name="gender" value="Male" required>
                    Male
                </label>

                <label>
                    <input type="radio" name="gender" value="Female">
                    Female
                </label>

                <label>
                    <input type="radio" name="gender" value="Other">
                    Other
                </label>
            </div>

            <label>Qualification</label>

            <select name="qualification" required>
                <option value="">Select Qualification</option>
                <option>10th</option>
                <option>12th</option>
                <option>Diploma</option>
                <option>BCA</option>
                <option>B.Tech</option>
                <option>MCA</option>
                <option>M.Tech</option>
                <option>Other</option>
            </select>

            <label>Description</label>

            <textarea name="description" rows="5" placeholder="Write about yourself"></textarea>

            <div class="buttons">
                <button type="submit" class="submit">Register</button>
                <button type="reset" class="reset">Reset</button>
            </div>

        </form>

    </div>

    </body>
    </html>

{% elif login %}
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Form</title>

        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:Arial, Helvetica, sans-serif;
            }

            body{
                background:#f4f4f4;
            }

            .container{
                width:400px;
                margin:80px auto;
                background:#fff;
                padding:25px;
                border-radius:10px;
                box-shadow:0 0 10px rgba(0,0,0,.2);
            }

            h2{
                text-align:center;
                margin-bottom:20px;
                color:#333;
            }

            label{
                display:block;
                margin-top:15px;
                font-weight:bold;
            }

            input{
                width:100%;
                padding:10px;
                margin-top:5px;
                border:1px solid #ccc;
                border-radius:5px;
                font-size:16px;
            }

            .buttons{
                margin-top:20px;
                display:flex;
                justify-content:space-between;
            }

            button{
                width:48%;
                padding:10px;
                border:none;
                border-radius:5px;
                font-size:16px;
                cursor:pointer;
            }

            .login{
                background:#007BFF;
                color:white;
            }

            .reset{
                background:#dc3545;
                color:white;
            }

            button:hover{
                opacity:0.9;
            }

            .links{
                text-align:center;
                margin-top:15px;
            }

            .links a{
                text-decoration:none;
                color:#007BFF;
            }

            .links a:hover{
                text-decoration:underline;
            }
        </style>
    </head>
    <body>

    <div class="container">
        <h1 style="color:green"> {{msg}} </h1>
        <h2>User Login</h2>

        <form action="{% url 'login' %}" method="post">
             {% csrf_token %}
            <label>Email</label>
            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
            >

            <div class="buttons">
                <button type="submit" class="login">Login</button>
                <button type="reset" class="reset">Reset</button>
            </div>

            <div class="links">
                <p>
                    Don't have an account?
                    <a href="register.html">Register Here</a>
                </p>

                <br>

                <a href="#">Forgot Password?</a>
            </div>

        </form>

    </div>

    </body>
    </html>
{% endif %}
